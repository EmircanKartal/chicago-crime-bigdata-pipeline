
services:

  # Zookeeper: coordination service required by Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: chicago_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Kafka: message broker that receives crime event streams from the producer
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: chicago_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: chicago_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://chicago_kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Spark Master: cluster manager UI and resource coordinator
  spark-master:
    build:
      context: ./services/spark
      dockerfile: Dockerfile
    container_name: chicago_spark_master
    depends_on:
      - kafka
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: chicago_kafka:9092
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/app/data
      - ./delta:/app/delta
      - ./jobs:/app/jobs
      - ./notebooks:/app/notebooks
      - ./configs:/app/configs

  # Spark Worker: executes Spark tasks delegated by the master
    

  spark-worker:
    build:
      context: ./services/spark
      dockerfile: Dockerfile
    container_name: chicago_spark_worker
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://chicago_spark_master:7077"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: chicago_kafka:9092
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./delta:/app/delta
      - ./jobs:/app/jobs
      - ./notebooks:/app/notebooks
      - ./configs:/app/configs

  # Producer: reads Chicago Crime CSV and streams JSON records into Kafka
  producer:
    build:
      context: .
      dockerfile: services/producer/Dockerfile
    container_name: chicago_producer
    depends_on:
      - kafka
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./services/producer/app:/app/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: chicago_kafka:9092
      KAFKA_TOPIC: chicago_crimes_raw
      CSV_PATH: /app/data/raw/chicago_crimes_sample.csv
      PRODUCE_RATE_PER_SEC: 10
      MAX_MESSAGES: 1000
    command: ["tail", "-f", "/dev/null"]

  # MLflow: experiment tracking server for ML model runs and artifacts
  mlflow:
    image: python:3.11-slim
    container_name: chicago_mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      sh -c "pip install mlflow &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
