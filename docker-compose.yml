version: "3.8"

services:

  # Zookeeper: coordination service required by Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"

  # Kafka: message broker that receives crime event streams from the producer
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper

  # Spark Master: cluster manager UI and resource coordinator
  spark-master:
    image: bitnami/spark:3.5
    ports:
      - "8080:8080"
      - "7077:7077"

  # Spark Worker: executes Spark tasks delegated by the master
  spark-worker:
    image: bitnami/spark:3.5
    depends_on:
      - spark-master

  # Producer: reads Chicago Crime CSV and streams JSON records into Kafka
  producer:
    build: services/producer/
    depends_on:
      - kafka

  # MLflow: experiment tracking server for ML model runs and artifacts
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    ports:
      - "5000:5000"
